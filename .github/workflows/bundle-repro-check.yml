name: Bundle Reproducibility Check

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bundle-repro-check:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "Windows NSIS"
            platform: "windows-2022"
            args: ""
            bundle_kind: "nsis"
            binary_dir: "src-tauri/target/release"
            binary_pattern: "sonar.exe"
            bundle_dir: "src-tauri/target/release/bundle/nsis"
            artifact_pattern: "*.exe"
          - label: "macOS DMG"
            platform: "macos-14"
            args: ""
            bundle_kind: "dmg"
            binary_dir: "src-tauri/target/release"
            binary_pattern: "sonar"
            bundle_dir: "src-tauri/target/release/bundle/dmg"
            artifact_pattern: "*.dmg"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: load build versions
        id: versions
        shell: bash
        run: ./script/ci/export-build-versions.sh

      - name: setup deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        with:
          deno-version: "v${{ steps.versions.outputs.DENO_VERSION }}"

      - name: install Rust pinned version
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.versions.outputs.RUST_VERSION }}
          targets: ${{ matrix.platform == 'macos-14' && steps.versions.outputs.MACOS_TARGET || '' }}

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: configure reproducible build environment
        shell: bash
        run: deno run -A ./security/repro-env.ts github-env >> "$GITHUB_ENV"

      - name: build bundle twice and compare hashes
        shell: bash
        env:
          BUNDLE_LABEL: ${{ matrix.label }}
          BUILD_ARGS: ${{ matrix.args }}
          BUILD_TARGET: ${{ matrix.platform == 'macos-14' && steps.versions.outputs.MACOS_TARGET || '' }}
          BUNDLE_KIND: ${{ matrix.bundle_kind }}
          BINARY_DIR: ${{ matrix.binary_dir }}
          BINARY_FALLBACK_DIRS: ${{ matrix.platform == 'macos-14' && format('src-tauri/target/{0}/release', steps.versions.outputs.MACOS_TARGET) || '' }}
          BINARY_PATTERN: ${{ matrix.binary_pattern }}
          BUNDLE_DIR: ${{ matrix.bundle_dir }}
          BUNDLE_FALLBACK_DIRS: ${{ matrix.platform == 'macos-14' && format('src-tauri/target/{0}/release/bundle/dmg', steps.versions.outputs.MACOS_TARGET) || '' }}
          ARTIFACT_PATTERN: ${{ matrix.artifact_pattern }}
        run: ./script/ci/check-bundle-repro.sh

      - name: upload compared artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bundle-repro-${{ matrix.platform }}
          path: bundle-repro/
          if-no-files-found: ignore
