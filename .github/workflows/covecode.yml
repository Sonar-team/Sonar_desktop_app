name: coverage

on: [push]

jobs:
  test:
    name: coverage
    runs-on: ubuntu-22.04
    container:
      image: xd009642/tarpaulin:develop-nightly@sha256:aa50bb80d14cb1cf54f8f904508a2d69b18d8804b46c9ee0ab435ac53f6861e6
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5

      - name: load build versions
        id: versions
        shell: bash
        run: ./script/ci/export-build-versions.sh

      - name: Node.js setup
        uses: actions/setup-node@f1f314fca9dfce2769ece7d933488f076716723e
        with:
          node-version: "v${{ steps.versions.outputs.NODE_VERSION }}"

      - name: Rust setup
        uses: actions-rs/toolchain@63eb9591781c46a70274cb3ebdf190fce92702e8
        with:
          toolchain: stable

      - name: Deno setup
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        with:
          deno-version: "v${{ steps.versions.outputs.DENO_VERSION }}"

      - name: Install dependencies (ubuntu only)
        run: |
          apt-get update
          apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpcap-dev

      - name: Install app dependencies and build web
        run: |
          npm install -g yarn
          yarn && yarn build
        shell: bash --noprofile --norc -e -o pipefail {0}

      - name: Debug information
        run: |
          pwd
          echo "pwd exit status: $?"
          ls -a
          echo "LS exit status: $?"
        shell: bash --noprofile --norc -e -o pipefail {0}

      # Combine directory change with Rust project build in a single step
      - name: Build Rust project in src-tauri directory
        run: |
          cd src-tauri
          cargo build --verbose
          ls -a # List contents to verify
        shell: bash --noprofile --norc -e -o pipefail {0}

      - name: Generate Rust coverage
        run: |
          cd src-tauri
          cargo +nightly tarpaulin \
            --verbose \
            --all-features \
            --workspace \
            --timeout 120 \
            --out xml \
            --exclude-files 'vendor/*' '*/vendor/*'
        shell: bash --noprofile --norc -e -o pipefail {0}

      - name: Generate frontend coverage
        run: |
          deno test --coverage=coverage/frontend src/tests/*.test.js
          deno coverage \
            --lcov \
            --include='^file:.*/src/' \
            --exclude='test\.(js|mjs|ts|jsx|tsx)$' \
            --output=coverage/frontend-lcov.info \
            coverage/frontend
        shell: bash --noprofile --norc -e -o pipefail {0}

      - name: Upload Rust coverage to codecov.io
        uses: codecov/codecov-action@f32b3a3741e1053eb607407145bc9619351dc93b
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: src-tauri/cobertura.xml
          flags: rust
          fail_ci_if_error: true

      - name: Upload frontend coverage to codecov.io
        uses: codecov/codecov-action@f32b3a3741e1053eb607407145bc9619351dc93b
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: coverage/frontend-lcov.info
          flags: frontend
          fail_ci_if_error: true
