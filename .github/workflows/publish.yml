name: "publish"

on:
  push:
    tags:
      - "app-v*"

jobs:
  reproducibility-check:
    name: verify unsigned reproducible artifacts
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: load build versions
        id: versions
        shell: bash
        run: ./script/ci/export-build-versions.sh

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "v${{ steps.versions.outputs.DENO_VERSION }}"

      - name: install Rust pinned version
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.versions.outputs.RUST_VERSION }}

      - name: install dependencies
        shell: bash
        run: |
          sudo ./script/ci/use-apt-snapshot.sh
          sudo apt-get install -y $LINUX_APT_PACKAGES

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: verify reproducible Linux build
        shell: bash
        env:
          REQUIRE_DEB: "1"
          ALLOW_BUNDLE_NON_REPRODUCIBLE: "1"
        run: ./security/repro-check.sh

  publish-tauri:
    name: build and publish release artifacts
    needs: reproducibility-check
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-2022"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: load build versions
        id: versions
        shell: bash
        run: ./script/ci/export-build-versions.sh

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "v${{ steps.versions.outputs.DENO_VERSION }}"

      - name: install Rust pinned version
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.versions.outputs.RUST_VERSION }}
          targets: ${{ matrix.platform == 'macos-14' && steps.versions.outputs.MACOS_TARGET || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo ./script/ci/use-apt-snapshot.sh
          sudo apt-get install -y $LINUX_APT_PACKAGES

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: configure reproducible build environment
        shell: bash
        run: deno run -A ./security/repro-env.ts github-env >> "$GITHUB_ENV"

      - name: Build and package with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sonar ${{ github.ref_name }}"
          releaseBody: "Voir les assets ci-dessous pour télécharger cette version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-14' && format('--target {0}', steps.versions.outputs.MACOS_TARGET) || matrix.args }}

      - name: Generate SHA256 checksums
        shell: bash
        run: ./script/ci/generate-release-hashes.sh "${{ matrix.platform }}"

      - name: List attestation subjects
        id: attestation-subjects
        shell: bash
        run: ./script/ci/generate-attestation-subjects.sh "${{ matrix.platform }}"

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.attestation-subjects.outputs.subject-paths }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        shell: bash
        run: ./script/ci/sign-release-artifacts.sh "${{ matrix.platform }}"

      - name: Upload Sigstore bundles to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./script/ci/upload-sigstore-bundles.sh "${{ matrix.platform }}"

      - name: Upload Sigstore bundles artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigstore-bundles-${{ matrix.platform }}
          path: |
            release-signatures/${{ matrix.platform }}-*.sigstore.json
          if-no-files-found: error

      - name: Upload release hashes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-hashes-${{ matrix.platform }}
          path: release-hashes-${{ matrix.platform }}.md
          if-no-files-found: error

  update-release-body:
    name: publish release hashes after artifact build
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download release hashes
        uses: actions/download-artifact@v4
        with:
          pattern: release-hashes-*
          path: release-hashes
          merge-multiple: true

      - name: Update GitHub release body with hashes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./script/ci/update-release-body.sh "${GITHUB_REF_NAME}"
