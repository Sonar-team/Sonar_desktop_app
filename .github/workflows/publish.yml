name: "publish"

on:
  push:
    tags:
      - "app-v*"

jobs:
  reproducibility-check:
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: install Rust pinned version 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpcap-dev

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: verify reproducible Linux build
        shell: bash
        env:
          REQUIRE_DEB: "1"
          ALLOW_BUNDLE_NON_REPRODUCIBLE: "1"
        run: ./security/repro-check.sh

  publish-tauri:
    needs: reproducibility-check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-2022"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: install Rust pinned version 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.platform == 'macos-14' && 'x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpcap-dev

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: configure reproducible build environment
        shell: bash
        run: deno run -A ./security/repro-env.ts github-env >> "$GITHUB_ENV"

      - name: Build and package with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sonar ${{ github.ref_name }}"
          releaseBody: "Voir les assets ci-dessous pour télécharger cette version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          checksum_file="SHA256SUMS-${{ matrix.platform }}.txt"

          if command -v sha256sum >/dev/null 2>&1; then
            hash_cmd=(sha256sum)
          else
            hash_cmd=(shasum -a 256)
          fi

          find src-tauri/target -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            | sort | while IFS= read -r artifact; do
              "${hash_cmd[@]}" "$artifact"
            done > "$checksum_file"
          test -s "$checksum_file"

      - name: Upload SHA256 checksums to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "SHA256SUMS-${{ matrix.platform }}.txt" --clobber
