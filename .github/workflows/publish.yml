name: "publish"

on:
  push:
    tags:
      - "app-v*"

jobs:
  reproducibility-check:
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: install Rust pinned version 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpcap-dev

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: verify reproducible Linux build
        shell: bash
        env:
          REQUIRE_DEB: "1"
          ALLOW_BUNDLE_NON_REPRODUCIBLE: "1"
        run: ./security/repro-check.sh

  publish-tauri:
    needs: reproducibility-check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-2022"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: install Rust pinned version 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.platform == 'macos-14' && 'x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpcap-dev

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: configure reproducible build environment
        shell: bash
        run: deno run -A ./security/repro-env.ts github-env >> "$GITHUB_ENV"

      - name: Build and package with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sonar ${{ github.ref_name }}"
          releaseBody: "Voir les assets ci-dessous pour télécharger cette version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate SHA256 checksums
        shell: bash
        run: ./script/ci/generate-release-hashes.sh "${{ matrix.platform }}"

      - name: Upload release hashes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-hashes-${{ matrix.platform }}
          path: release-hashes-${{ matrix.platform }}.md
          if-no-files-found: error

  update-release-body:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download release hashes
        uses: actions/download-artifact@v4
        with:
          pattern: release-hashes-*
          path: release-hashes
          merge-multiple: true

      - name: Update GitHub release body with hashes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./script/ci/update-release-body.sh "${GITHUB_REF_NAME}"
