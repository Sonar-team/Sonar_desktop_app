name: "publish"

on:
  push:
    tags:
      - "app-v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
        fail-fast: false
        matrix:
          include:
          - platform: "macos-13"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-2022"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13

      - name: install Rust pinned version 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libpcap-dev

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: Build and package with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sonar ${{ github.ref_name }}"
          releaseBody: "Voir les assets ci-dessous pour télécharger cette version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
