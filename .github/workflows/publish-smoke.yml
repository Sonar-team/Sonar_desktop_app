name: Publish Smoke

on:
  workflow_dispatch:

jobs:
  publish-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-2022"
            args: ""
          - platform: "macos-14"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: load build versions
        id: versions
        shell: bash
        run: ./script/ci/export-build-versions.sh

      - name: setup deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        with:
          deno-version: "v${{ steps.versions.outputs.DENO_VERSION }}"

      - name: install Rust pinned version
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.versions.outputs.RUST_VERSION }}
          targets: ${{ matrix.platform == 'macos-14' && steps.versions.outputs.MACOS_TARGET || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo ./script/ci/use-apt-snapshot.sh
          sudo apt-get install -y $LINUX_APT_PACKAGES

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: configure reproducible build environment
        shell: bash
        run: deno run -A ./security/repro-env.ts github-env >> "$GITHUB_ENV"

      - name: smoke build with Tauri
        shell: bash
        env:
          BUILD_ARGS: ${{ matrix.args }}
          BUILD_TARGET: ${{ matrix.platform == 'macos-14' && steps.versions.outputs.MACOS_TARGET || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$BUILD_TARGET" && -n "$BUILD_ARGS" ]]; then
            npm run tauri build -- $BUILD_ARGS --target "$BUILD_TARGET"
          elif [[ -n "$BUILD_TARGET" ]]; then
            npm run tauri build -- --target "$BUILD_TARGET"
          elif [[ -n "$BUILD_ARGS" ]]; then
            npm run tauri build -- $BUILD_ARGS
          else
            npm run tauri build
          fi

  debian-repro-smoke:
    name: verify reproducible Debian package
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: load build versions
        id: versions
        shell: bash
        run: ./script/ci/export-build-versions.sh

      - name: setup deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        with:
          deno-version: "v${{ steps.versions.outputs.DENO_VERSION }}"

      - name: install Rust pinned version
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.versions.outputs.RUST_VERSION }}

      - name: install dependencies
        shell: bash
        run: |
          sudo ./script/ci/use-apt-snapshot.sh
          sudo apt-get install -y $LINUX_APT_PACKAGES

      - name: install frontend dependencies deterministically
        run: deno install --frozen

      - name: configure reproducible build environment
        shell: bash
        run: deno run -A ./security/repro-env.ts github-env >> "$GITHUB_ENV"

      - name: build Debian package
        shell: bash
        run: deno task tauri build --ci --no-sign --bundles deb

      - name: verify reproducible Debian package
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find src-tauri/target/release/bundle/deb -maxdepth 2 -type f -name '*.deb' | sort | head -n 1)"
          test -n "$deb_path"

          output_dir="$(mktemp -d)"
          first_deb="${output_dir}/first.deb"
          second_deb="${output_dir}/second.deb"

          ./script/package-deb-repro.sh "$deb_path" "$first_deb" >/dev/null
          ./script/package-deb-repro.sh "$deb_path" "$second_deb" >/dev/null

          sha256sum "$first_deb" "$second_deb"
          cmp -s "$first_deb" "$second_deb"
